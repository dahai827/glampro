name: "GlamPro"
options:
  bundleIdPrefix: com.liuying
  deploymentTarget:
    iOS: "15.6"
  developmentLanguage: en

packages:
  FacebookSDK:
    url: https://github.com/facebook/facebook-ios-sdk
    from: 18.0.3

targets:
  GlamPro:
    type: application
    platform: iOS
    deploymentTarget: "15.6"
    supportedDestinations:
      - iOS
    sources:
      - path: GlamPro
      - path: Banner Slider
        type: folder
    dependencies:
      - package: FacebookSDK
        product: FacebookCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liuying.glampro
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: GlamPro
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: Use the camera to capture your source photo for AI generation.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Use your photo library to choose source images for AI generation.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Allow Glam Pro to save generated images and videos to your Photos.
        INFOPLIST_KEY_NSUserTrackingUsageDescription: Your data will be used to deliver personalized ads to you.
        INFOPLIST_KEY_FacebookAppID: "1261567822843388"
        INFOPLIST_KEY_FacebookClientToken: "7f8164762043d79e0107d264ad591677"
        INFOPLIST_KEY_FacebookDisplayName: Glam pro
        INFOPLIST_KEY_FacebookAutoLogAppEventsEnabled: YES
        INFOPLIST_KEY_FacebookAdvertiserIDCollectionEnabled: YES
        INFOPLIST_KEY_SKIncludeConsumableInAppPurchaseHistory: YES
        INFOPLIST_KEY_CFBundleURLTypes_0_CFBundleURLSchemes_0: fb1261567822843388
        INFOPLIST_KEY_LSApplicationQueriesSchemes_0: fbapi
        INFOPLIST_KEY_LSApplicationQueriesSchemes_1: fb-messenger-share-api
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_LANGUAGE: en
        SWIFT_VERSION: "5.0"
