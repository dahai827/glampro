name: iOS Build and Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show SDK
        run: xcodebuild -showsdks

      - name: Prepare build variables
        env:
          APP_NAME: ${{ secrets.APP_NAME }}
        run: |
          echo "IOS_PROJECT_PATH=${APP_NAME}.xcodeproj" >> $GITHUB_ENV
          echo "IOS_SCHEME=${APP_NAME}" >> $GITHUB_ENV
          echo "IOS_ARCHIVE_PATH=${APP_NAME}.xcarchive" >> $GITHUB_ENV
          echo "IOS_IPA_NAME=${APP_NAME}.ipa" >> $GITHUB_ENV

      - name: Install certificate and profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="temporary_password"

          echo -n "$IOS_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$IOS_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$IOS_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Show installed signing identities
        run: |
          security find-identity -v -p codesigning
      
      - name: Inspect provisioning profile
        run: |
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision > profile.plist
          /usr/libexec/PlistBuddy -c "Print :Name" profile.plist || true
          /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" profile.plist || true
          /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" profile.plist || true
          /usr/libexec/PlistBuddy -c "Print :UUID" profile.plist || true

      - name: Create ExportOptions.plist
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${PROVISIONING_PROFILE_SPECIFIER}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          APP_VERSION: ${{ secrets.APP_VERSION }}
        run: |
          xcodebuild \
            -project "$IOS_PROJECT_PATH" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$IOS_ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$IOS_ARCHIVE_PATH" \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: Create API key JSON
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os

          data = {
              "key_id": os.environ["APPSTORE_KEY_ID"],
              "issuer_id": os.environ["APPSTORE_ISSUER_ID"],
              "key": os.environ["APPSTORE_PRIVATE_KEY"],
          }

          with open("api_key.json", "w", encoding="utf-8") as f:
              json.dump(data, f)
          PY

      - name: Upload to TestFlight
        run: |
          fastlane pilot upload \
            --api_key_path api_key.json \
            --ipa "build/$IOS_IPA_NAME"
